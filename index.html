<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP - Mina Jaliezer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg-dark:#0a0a0a;--bg-panel:rgba(20,20,20,0.95);--primary:#d4af37;--text-main:#e0e6ed;--text-muted:#8b9bb4;--border-light:1px solid rgba(212,175,55,0.3);--success:#00ff88;--danger:#ff006e;--warning:#ffc300;--info:#17a2b8;--sidebar-w:260px}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Rajdhani',sans-serif}
body{display:flex;min-height:100vh;background:var(--bg-dark);color:var(--text-main);overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
.sidebar{width:var(--sidebar-w);background:var(--bg-panel);border-right:var(--border-light);height:100vh;position:fixed;display:flex;flex-direction:column;z-index:10;transition:transform .3s}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.header{background:var(--bg-panel);padding:12px 30px;border-bottom:var(--border-light);display:flex;justify-content:space-between;align-items:center;gap:15px;flex-wrap:wrap}
.content{padding:20px;flex:1;overflow-y:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:4px;border:none;font-weight:600;text-transform:uppercase;cursor:pointer;transition:.2s;font-size:.8rem;letter-spacing:.5px}
.btn:hover{filter:brightness(1.2);transform:translateY(-1px)}
.btn-primary{background:var(--primary);color:#000}.btn-success{background:var(--success);color:#000}
.btn-danger{background:var(--danger);color:#fff}.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff}
.btn-info{background:var(--info);color:#fff}.btn-warning{background:var(--warning);color:#000}.btn-sm{padding:5px 10px;font-size:.7rem}
input,select,textarea{width:100%;padding:10px 12px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);border-radius:4px;color:#fff;font-size:.9rem;transition:border-color .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(212,175,55,.15)}
input[readonly]{background:rgba(255,255,255,.05);color:var(--text-muted)}
label{display:block;font-size:.75rem;color:var(--primary);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:15px}
.card{background:var(--bg-panel);border:var(--border-light);border-radius:8px;padding:20px;margin-bottom:20px;position:relative;animation:cardIn .3s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.badge{padding:3px 8px;border-radius:12px;font-size:.65rem;font-weight:700;text-transform:uppercase;white-space:nowrap}
.bg-success{background:rgba(0,255,136,.15);color:var(--success)}.bg-danger{background:rgba(255,0,110,.15);color:var(--danger)}
.bg-info{background:rgba(0,180,216,.15);color:var(--primary)}.bg-warning{background:rgba(255,195,0,.15);color:var(--warning)}
table{width:100%;border-collapse:collapse}th,td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
th{color:var(--primary);font-size:.75rem;text-transform:uppercase;background:rgba(212,175,55,.05)}tbody tr:hover{background:rgba(212,175,55,.08)}
.text-danger{color:var(--danger);font-weight:bold}.text-success{color:var(--success);font-weight:bold}
.sidebar-header{padding:20px;text-align:center;border-bottom:var(--border-light)}
.sidebar-header h1{font-family:'Orbitron';font-size:1rem;color:var(--primary);margin-top:10px}
.sidebar nav{flex:1;overflow-y:auto;padding:10px 0}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--text-muted);text-decoration:none;font-weight:600;border-left:3px solid transparent;transition:.2s;cursor:pointer;font-size:.9rem}
.sidebar nav a:hover,.sidebar nav a.active{background:rgba(212,175,55,.1);color:#fff;border-left-color:var(--primary)}
#menuToggle{display:none}.toast-container{position:fixed;top:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:6px;color:#fff;font-weight:600;font-size:.9rem;animation:slideIn .3s ease;min-width:220px;display:flex;align-items:center;gap:8px}
.toast-success{background:var(--success);color:#000}.toast-danger{background:var(--danger)}.toast-info{background:var(--primary);color:#000}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px}
.kpi-card{padding:20px;border-radius:8px;border-left:4px solid;display:flex;flex-direction:column;transition:transform .2s;background:var(--bg-panel)}
.kpi-card:hover{transform:translateY(-3px)}
.kpi-label{font-size:.85rem;color:var(--text-muted);margin-bottom:8px}
.kpi-value{font-size:1.6rem;font-family:'Orbitron';font-weight:bold}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;overflow-y:auto;padding:20px}
.modal-overlay.show{display:block}
.modal-box{background:#141414;border:var(--border-light);border-radius:8px;width:100%;max-width:700px;margin:0 auto;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:15px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto}.modal-footer{padding:15px 20px;border-top:1px solid rgba(255,255,255,.1);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
.search-box input{max-width:400px;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3)}
.report-print-area{padding:20px;background:#fff;color:#000}
#loginOverlay{position:fixed;inset:0;background:linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--bg-panel);padding:40px;border-radius:8px;border:1px solid var(--primary);width:350px;text-align:center}
.stock-card{background:rgba(0,180,216,.05);border:1px solid rgba(0,180,216,.2);padding:15px;border-radius:8px;text-align:center}
.alert-box{background:rgba(255,0,110,.1);border:1px solid var(--danger);color:var(--danger);padding:15px;border-radius:8px;margin-bottom:15px;display:flex;align-items:center;gap:10px}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}#menuToggle{display:inline-flex!important}.form-row{grid-template-columns:1fr}.kpi-grid{grid-template-columns:1fr 1fr}.header{padding:10px 15px}}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>
<div id="modalGeneric" class="modal-overlay"><div class="modal-box"><div class="modal-header"><h2 id="modalTitle"></h2><span class="btn btn-outline" onclick="closeModal()">✕</span></div><div class="modal-body" id="modalBody"></div><div class="modal-footer" id="modalFooter"></div></div></div>

<nav class="sidebar" id="mainSidebar">
    <div class="sidebar-header">
        <h1>MINA JALIEZER</h1>
        <p style="font-size:.7rem;color:var(--text-muted)">Controlo Operacional</p>
    </div>
    <nav id="menuNav"></nav>
    <div style="padding:15px;border-top:1px solid rgba(255,255,255,.1)">

<main class="main">
    <header class="header">
        <div style="display:flex;align-items:center;gap:10px">
            <button class="btn btn-outline" id="menuToggle" onclick="document.getElementById('mainSidebar').classList.toggle('open')">☰</button>
            <h1 style="font-family:'Orbitron';font-size:1.1rem"><span id="pageTitle">Dashboard</span></h1>
        </div>
        <div style="display:flex;align-items:center;gap:15px;flex-wrap:wrap">
            <select id="dashMonthFilter" onchange="loadDashboard()" style="width:auto;padding:6px"></select>
            <span style="font-size:.8rem;color:var(--primary);text-transform:uppercase;font-weight:700" id="currentUserRole"></span>
            <span id="currentUserName" style="font-size:.9rem;color:var(--text-muted)">Administrador</span>
        </div>
    </header>
    <div class="content" id="appContent"></div>
</main>

<script>
/* ==================== LOCAL DATABASE ==================== */
var DB = {
    get: function(t) { var data = localStorage.getItem('jaliezer_'+t); return data ? JSON.parse(data) : []; },
    save: function(t, data) { localStorage.setItem('jaliezer_'+t, JSON.stringify(data)); },
    insert: function(t, r) { var data = this.get(t); data.push(r); this.save(t, data); return r; },
    update: function(t, id, newData) { var data = this.get(t); var i = data.findIndex(function(x){ return x.id === id; }); if(i >= 0) { data[i] = Object.assign({}, data[i], newData); this.save(t, data); return data[i]; } return null; },
    del: function(t, id) { var data = this.get(t); data = data.filter(function(x){ return x.id !== id; }); this.save(t, data); }
};

/* ==================== HELPERS ==================== */
function showToast(msg, type) {
    type = type || 'success'; var c = document.getElementById('toastContainer'), t = document.createElement('div');
    t.className = 'toast toast-' + type; var icons = { success: '✅', danger: '❌', info: 'ℹ️' };
    t.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>'; c.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}
function getTodayStr() { var d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function fmt(n) { return new Intl.NumberFormat('pt-AO', { minimumFractionDigits:2, maximumFractionDigits:2 }).format(n||0); }
function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
function modal(t, b, fn, txt, cls) {
    txt = txt || 'Salvar'; cls = cls || 'btn-primary';
    document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = b;
    var footer = document.getElementById('modalFooter'); footer.innerHTML = '<button class="btn btn-outline" onclick="closeModal()">Fechar</button>';
    if (fn) { var btn = document.createElement('button'); btn.className = 'btn ' + cls; btn.innerText = txt; btn.onclick = function() { fn(); }; footer.prepend(btn); }
    document.getElementById('modalGeneric').classList.add('show');
}
function closeModal() { document.getElementById('modalGeneric').classList.remove('show'); }
function parseDate(s) { if(!s) return null; var p = s.split('/'); if(p.length === 3) return new Date(p[2], p[1]-1, p[0]); return new Date(s); }
function getMonthName(mIdx) { var m=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']; return m[mIdx]; }

/* Cálculo Progressivo IRT Angola 2023+ */
function calcIRT(salario) {
    if (salario <= 70000) return 0;
    if (salario <= 100000) return (salario - 70000) * 0.10;
    if (salario <= 150000) return ((salario - 100000) * 0.15) + 3000;
    if (salario <= 250000) return ((salario - 150000) * 0.20) + 10500;
    if (salario <= 500000) return ((salario - 250000) * 0.25) + 30500;
    return ((salario - 500000) * 0.30) + 93000;
}

var _filterTimeout = null;
function filterTable(el, tid) {
    clearTimeout(_filterTimeout); _filterTimeout = setTimeout(function() {
        var f = el.value.toLowerCase(); var tb = document.getElementById(tid); if (!tb) return; var rows = tb.getElementsByTagName('tr');
        for (var i = 1; i < rows.length; i++) { var cells = rows[i].getElementsByTagName('td'); var m = false; for (var j = 0; j < cells.length; j++) { if (cells[j].innerText.toLowerCase().indexOf(f) > -1) m = true; } rows[i].style.display = m ? '' : 'none'; }
    }, 200);
}

function hashPass(pass) {
    var hash = 0, i, chr;
    for (i = 0; i < pass.length; i++) { chr = pass.charCodeAt(i); hash = ((hash << 5) - hash) + chr; hash |= 0; }
    return 'h_' + Math.abs(hash).toString(16);
}

function logAction(action, detail) {
    if(!currentUser) return;
    var logs = DB.get('audit_logs');
    logs.push({ id:'log'+Date.now(), user: currentUser.name, role: currentUser.role, action: action, detail: detail, date: new Date().toLocaleString('pt-AO') });
    DB.save('audit_logs', logs);
}

function handleFileUpload(inputId, callback) {
    var file = document.getElementById(inputId).files[0];
    if (!file) return callback(null);
    if (file.size > 1000000) { showToast('Ficheiro muito grande! Máx 1MB.', 'danger'); return callback(null); }
    var reader = new FileReader();
    reader.onload = function(e) { callback(e.target.result); };
    reader.readAsDataURL(file);
}

/* ==================== AUTENTICAÇÃO E PERMISSÕES ==================== */
var currentUser = null;
var menuPermissions = {
    'admin': ['dashboard', 'production', 'fuel', 'provisions', 'employees', 'equipment', 'finance', 'patrimony', 'suppliers', 'reports', 'config', 'users', 'audit'],
    'contabilista': ['dashboard', 'production', 'finance', 'patrimony', 'suppliers', 'reports', 'config'],
    'rh': ['dashboard', 'employees'],
    'secretaria': ['dashboard', 'provisions', 'equipment', 'suppliers']
};

function login() {
    var u = val('loginUser'), p = val('loginPass');
    var users = DB.get('users');
    var found = users.find(function(x){ return x.user === u && x.pass === hashPass(p); });
    if (found) {
        currentUser = found;
        localStorage.setItem('jaliezer_session', found.id);
        document.getElementById('loginOverlay').style.display = 'none';
        logAction('Login', 'Entrou no sistema');
        initApp();
    } else {
        showToast('Credenciais inválidas!', 'danger');
    }
}
function logout() { logAction('Logout', 'Saiu do sistema'); currentUser = null; localStorage.removeItem('jaliezer_session'); location.reload(); }

/* ==================== INIT & SIDEBAR ==================== */
function initApp() {
    document.getElementById('currentUserName').innerText = currentUser.name;
    document.getElementById('currentUserRole').innerText = currentUser.role;
    var select = document.getElementById('dashMonthFilter');
    var today = new Date();
    for(var i=0; i<12; i++) {
        var d = new Date(today.getFullYear(), today.getMonth() - i, 1);
        select.innerHTML += '<option value="'+d.getMonth()+'-'+d.getFullYear()+'">'+getMonthName(d.getMonth())+' '+d.getFullYear()+'</option>';
    }
    loadSidebar();
    navigate('dashboard');
}
function loadSidebar() {
    var nav = document.getElementById('menuNav');
    var allItems = [
        { id: 'dashboard', i: '📊', t: 'Dashboard' },
        { id: 'production', i: '⛏️', t: 'Produção (Extração)' },
        { id: 'fuel', i: '⛽', t: 'Combustível' },
        { id: 'provisions', i: '🍚', t: 'Alimentação e Consumo' },
        { id: 'employees', i: '👷', t: 'Recursos Humanos' },
        { id: 'equipment', i: '🚜', t: 'Equipamentos' },
        { id: 'finance', i: '🏦', t: 'Financeiro (Caixa/Banco)' },
        { id: 'patrimony', i: '🏛️', t: 'Património e Ativos' },
        { id: 'suppliers', i: '🚚', t: 'Fornecedores' },
        { id: 'reports', i: '📈', t: 'Relatórios' },
        { id: 'config', i: '⚙️', t: 'Configurações' },
        { id: 'users', i: '👤', t: 'Gestão de Acessos' },
        { id: 'audit', i: '🛡️', t: 'Auditoria' }
    ];
    var allowed = menuPermissions[currentUser.role] || [];
    var items = allItems.filter(function(x){ return allowed.includes(x.id); });
    nav.innerHTML = items.map(function(x) { return '<a onclick="navigate(\'' + x.id + '\')">' + x.i + ' ' + x.t + '</a>'; }).join('');
}
function navigate(id) {
    var allowed = menuPermissions[currentUser.role] || [];
    if(!allowed.includes(id)) return showToast('Acesso Negado!', 'danger');
    document.querySelectorAll('.sidebar nav a').forEach(function(a) { a.classList.remove('active'); });
    var a = document.querySelector('.sidebar nav a[onclick*="' + id + '"]'); if (a) a.classList.add('active');
    var titles = { dashboard:'Dashboard', production:'Produção', fuel:'Combustível', provisions:'Alimentação', employees:'Recursos Humanos', equipment:'Equipamentos', finance:'Financeiro', patrimony:'Património', suppliers:'Fornecedores', reports:'Relatórios', config:'Configurações', users:'Gestão de Acessos', audit:'Auditoria' };
    document.getElementById('pageTitle').innerText = titles[id] || id;
    var actions = { dashboard: loadDashboard, production: loadProduction, fuel: loadFuel, provisions: loadProvisions, employees: loadEmployees, equipment: loadEquipment, finance: loadFinance, patrimony: loadPatrimony, suppliers: loadSuppliers, reports: loadReports, config: loadConfig, users: loadUsers, audit: loadAudit };
    if (actions[id]) actions[id](); document.getElementById('mainSidebar').classList.remove('open');
}

/* ==================== DASHBOARD (COM ALERTAS) ==================== */
var dashChart = null;
function loadDashboard() {
    var filterVal = document.getElementById('dashMonthFilter').value;
    var fParts = filterVal.split('-'); var fMonth = parseInt(fParts[0]); var fYear = parseInt(fParts[1]);
    var isInFilterMonth = function(dateStr) { var d = parseDate(dateStr); return d && d.getMonth() === fMonth && d.getFullYear() === fYear; };
    
    var fuel = DB.get('fuel_logs'), prov = DB.get('provisions_logs'), emp = DB.get('employees'), fin = DB.get('finance_logs'), pat = DB.get('patrimony_logs');
    
    // Alertas de Stock
    var fuelStock = fuel.reduce(function(a,b){return a + (b.type==='Entrada' ? b.litros : -b.litros);},0);
    var provStock = {}; 
    prov.forEach(function(p) {
        var match = p.qty.match(/\d+/); var num = match ? parseInt(match[0]) : 0;
        if(!provStock[p.item]) provStock[p.item] = 0; provStock[p.item] += (p.type === 'Entrada' ? num : -num);
    });
    
    var alertsHtml = '';
    if (fuelStock < 200) alertsHtml += '<div class="alert-box">⚠️ ALERTA: Stock de combustível baixo ('+fuelStock+' L). Reabastecer urgente!</div>';
    for(var item in provStock) { if (provStock[item] <= 5) alertsHtml += '<div class="alert-box">⚠️ ALERTA: Stock de '+item+' baixo ('+provStock[item]+' unidades).</div>'; }

    var totFuel = fuel.filter(function(f){return f.type==='Entrada' && isInFilterMonth(f.date);}).reduce(function(a,b){return a+(b.val||0);},0);
    var totProv = prov.filter(function(p){return p.type==='Entrada' && isInFilterMonth(p.date);}).reduce(function(a,b){return a+(b.cost||0);},0);
    var totSal = emp.reduce(function(a,b){return a+(b.salary||0);},0); 
    var totFinEnt = fin.filter(function(f){return f.type==='Entrada' && f.status==='Pago' && isInFilterMonth(f.date);}).reduce(function(a,b){return a+(b.val||0);},0);
    var totFinSai = fin.filter(function(f){return f.type==='Saída' && f.status==='Pago' && isInFilterMonth(f.date);}).reduce(function(a,b){return a+(b.val||0);},0);
    var totPatEnt = pat.filter(function(p){return p.type==='Entrada' && isInFilterMonth(p.date);}).reduce(function(a,b){return a+(b.val||0);},0);
    
    var aReceber = fin.filter(function(f){return f.type==='Entrada' && f.status==='Pendente';}).reduce(function(a,b){return a+(b.val||0);},0);
    var aPagar = fin.filter(function(f){return f.type==='Saída' && f.status==='Pendente';}).reduce(function(a,b){return a+(b.val||0);},0);

    var despesasTotais = totFuel + totProv + totSal + totFinSai + totPatEnt;
    var saldoCaixa = totFinEnt - despesasTotais;

    var html = alertsHtml +
    '<div class="kpi-grid">'+
        '<div class="kpi-card" style="background:rgba(0,255,136,.05);border-left-color:var(--success)"><div class="kpi-label">Saldo do Mês (Realizado)</div><div class="kpi-value" style="color:'+(saldoCaixa>=0?'var(--success)':'var(--danger)')+'">'+fmt(saldoCaixa)+' Kz</div></div>'+
        '<div class="kpi-card" style="background:rgba(255,0,110,.05);border-left-color:var(--danger)"><div class="kpi-label">Combustível ('+getMonthName(fMonth).slice(0,3)+')</div><div class="kpi-value" style="color:var(--danger)">'+fmt(totFuel)+' Kz</div></div>'+
        '<div class="kpi-card" style="background:rgba(255,195,0,.05);border-left-color:var(--warning)"><div class="kpi-label">Contas a Receber (Crédito)</div><div class="kpi-value" style="color:var(--warning)">'+fmt(aReceber)+' Kz</div></div>'+
        '<div class="kpi-card" style="background:rgba(212,175,55,.05);border-left-color:var(--primary)"><div class="kpi-label">Contas a Pagar (Dívida)</div><div class="kpi-value" style="color:var(--primary)">'+fmt(aPagar)+' Kz</div></div>'+
    '</div>';
    
    html += '<div style="display:grid;grid-template-columns:2fr 1fr;gap:15px">'+
        '<div class="card"><h3>Gastos Operacionais do Mês</h3><canvas id="dashChartCanvas" height="100"></canvas></div>'+
        '<div class="card"><h3>Movimentos Financeiros</h3><table><thead><tr><th>Data</th><th>Desc</th><th>Valor</th></tr></thead><tbody>';
    fin.filter(function(f){return isInFilterMonth(f.date);}).reverse().forEach(function(f) { 
        var v = f.type==='Entrada' ? '<span class="text-success">+'+fmt(f.val)+'</span>' : '<span class="text-danger">-'+fmt(f.val)+'</span>';
        html += '<tr><td>'+f.date+'</td><td>'+f.desc+'</td><td>'+v+'</td></tr>'; 
    });
    if(!fin.length) html += '<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">Sem registos</td></tr>';
    html += '</tbody></table></div></div>';
    document.getElementById('appContent').innerHTML = html;
    renderDashChart(totFuel, totProv, totSal, totFinSai, totPatEnt);
}
function renderDashChart(fuel, prov, sal, fin, pat) {
    var ctx = document.getElementById('dashChartCanvas');
    if(!ctx) return;
    if(dashChart) dashChart.destroy();
    dashChart = new Chart(ctx.getContext('2d'), {
        type: 'bar',
        data: { labels: ['Combustível', 'Alimentação', 'Salários', 'Outras Despesas', 'Património'], datasets: [{ label: 'Gasto (Kz)', data: [fuel, prov, sal, fin, pat], backgroundColor: ['rgba(255,0,110,.5)', 'rgba(255,195,0,.5)', 'rgba(212,175,55,.5)', 'rgba(0,180,216,.5)', 'rgba(123,45,200,.5)'], borderColor: ['#ff006e', '#ffc300', '#d4af37', '#17a2b8', '#7b2dc8'], borderWidth: 1 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { color: '#8b9bb4' } }, x: { ticks: { color: '#8b9bb4' } } } }
    });
}

function loadProvisions() {
    var data = DB.get('provisions_logs');
    var stock = {}; var unities = {};
    data.forEach(function(p) {
        var match = p.qty.match(/\d+/); var num = match ? parseInt(match[0]) : 0; var unit = p.qty.replace(/[0-9]/g, '').trim();
        if(!stock[p.item]) stock[p.item] = 0; stock[p.item] += (p.type === 'Entrada' ? num : -num); unities[p.item] = unit;
    });
    var stockHtml = '<div class="kpi-grid" style="margin-bottom:15px">';
    for(var item in stock) {
        var color = stock[item] <= 5 ? 'var(--danger)' : 'var(--success)';
        stockHtml += '<div class="stock-card"><div style="font-size:.8rem;color:var(--text-muted)">'+item+'</div><div style="font-size:1.4rem;color:'+color+';font-weight:bold">'+stock[item]+'</div><div style="font-size:.7rem;color:var(--text-muted)">'+unities[item]+'</div></div>';
    }
    stockHtml += '</div>';
    var html = '<div style="display:flex;justify-content:space-between;margin-bottom:15px;flex-wrap:wrap;gap:10px"><h2>🍚 Alimentação e Consumo</h2><button class="btn btn-primary btn-sm" onclick="openModalProv()">➕ Novo Movimento</button></div>'+stockHtml+'<div class="card"><table id="tblProv"><thead><tr><th>Data</th><th>Item</th><th>Tipo</th><th>Qtd</th><th>Responsável</th><th>Custo (Kz)</th><th>Ações</th></tr></thead><tbody>';
    data.reverse().forEach(function(p) { var typeClass = p.type==='Entrada' ? 'bg-success' : 'bg-warning'; html += '<tr><td>'+p.date+'</td><td><strong>'+p.item+'</strong></td><td><span class="badge '+typeClass+'">'+p.type+'</span></td><td>'+p.qty+'</td><td>'+(p.responsible||'-')+'</td><td>'+(p.type==='Entrada'?'<span class="text-danger">-'+fmt(p.cost)+'</span>':'-')+'</td><td><button class="btn btn-danger btn-sm" onclick="delProv(\''+p.id+'\')">🗑️</button></td></tr>'; });
    if(!data.length) html += '<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">Nenhum registo.</td></tr>';
    html += '</tbody></table></div>'; document.getElementById('appContent').innerHTML = html;
}

function genPaycheck(id) {
    var emp = DB.get('employees').find(function(x){return x.id===id;});
    var config = DB.get('company_config')[0] || {name:'Mina Jaliezer', nif:'N/D', address:'Angola'};
    var irt = calcIRT(emp.salary); 
    var seg = (emp.salary * 0.03); 
    var liquido = emp.salary - irt - seg;
    var html = '<div id="payPrint" style="padding:20px;background:#fff;color:#000;width:210mm;margin:auto;font-family:Arial">'+
        '<div style="text-align:center;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:20px"><h2 style="margin:0">'+config.name+'</h2><p style="margin:0">NIF: '+config.nif+' | '+config.address+'</p></div>'+

        '<div class="kpi-card" style="background:rgba(255,0,110,.05);border-left-color:var(--danger)"><div class="kpi-label">Contas a Pagar</div><div class="kpi-value" style="color:var(--danger)">'+fmt(aPagar)+' Kz</div></div>'+

function exportBackup() {
    var tables = ['users','fuel_logs','provisions_logs','employees','equipment','finance_logs','patrimony_logs','audit_logs','suppliers','production_logs','company_config','maintenance_logs'];
    var backup = {}; tables.forEach(function(t){ backup[t] = DB.get(t); });
    var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup));
    var link = document.createElement('a'); link.href = dataStr; link.download = "Backup_Mina_Jaliezer_"+getTodayStr().replace(/\//g,'-')+".json";
    document.body.appendChild(link); link.click(); link.remove(); showToast('Backup descarregado!','info');
}
function importBackup(event) {
    var file = event.target.files[0]; if(!file) return; var reader = new FileReader();
    reader.onload = function(e) {
        try { var data = JSON.parse(e.target.result); if(confirm('ATENÇÃO: Isto vai APAGAR todos os dados atuais e substituir pelos dados do ficheiro. Continuar?')) { for(var table in data) { DB.save(table, data[table]); } showToast('Backup restaurado! O sistema vai recarregar...','success'); setTimeout(function(){ location.reload(); }, 2000); } } catch(err) { showToast('Erro: Ficheiro inválido.','danger'); }
    }; reader.readAsText(file);
}

        var totFinSai = fin.filter(function(f){return f.type==='Saída' && f.status==='Pago';}).reduce(function(a,b){return a+b.val;},0);
        var lucro = totFinEnt - (totFuel + totSal + totFinSai);
        
        html += '<h3 style="color:#000;margin-bottom:10px">1. Resumo Financeiro Geral</h3><table style="width:100%;border-collapse:collapse;margin-bottom:20px"><thead><tr style="background:#f0f0f0"><th style="border:1px solid #ccc;padding:8px;text-align:left">Categoria</th><th style="border:1px solid #ccc;padding:8px;text-align:right">Valor (Kz)</th></tr></thead><tbody>'+
        '<tr><td style="border:1px solid #ccc;padding:8px">Receitas Financeiras</td><td style="border:1px solid #ccc;padding:8px;text-align:right;color:green">'+fmt(totFinEnt)+'</td></tr>'+
        '<tr><td style="border:1px solid #ccc;padding:8px">(-) Combustível</td><td style="border:1px solid #ccc;padding:8px;text-align:right;color:red">'+fmt(totFuel)+'</td></tr>'+
        '<tr><td style="border:1px solid #ccc;padding:8px">(-) Salários</td><td style="border:1px solid #ccc;padding:8px;text-align:right;color:red">'+fmt(totSal)+'</td></tr>'+
        '<tr><td style="border:1px solid #ccc;padding:8px">(-) Outras Despesas</td><td style="border:1px solid #ccc;padding:8px;text-align:right;color:red">'+fmt(totFinSai)+'</td></tr>'+
        '<tr style="background:#d4af37"><td style="border:1px solid #ccc;padding:8px"><strong>LUCRO / PREJUÍZO</strong></td><td style="border:1px solid #ccc;padding:8px;text-align:right;font-size:1.2rem"><strong>'+fmt(lucro)+'</strong></td></tr></tbody></table>';
    }

    if(type) { printArea.style.display = 'block'; printArea.innerHTML = html; } else { printArea.style.display = 'none'; printArea.innerHTML = ''; }
}

function exportPDF() {
    if(!val('reportType')) return showToast('Selecione um relatório primeiro','danger');
    var element = document.getElementById('reportPrintArea');
    var opt = { margin: 10, filename: 'Relatorio_Mina_Jaliezer.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    showToast('A gerar PDF...','info'); html2pdf().set(opt).from(element).save();
}
function exportCSV() {
    var type = val('reportType'); if(!type) return showToast('Selecione um relatório primeiro','danger');
    var rows = [["Relatorio Mina Jaliezer - " + getTodayStr()]]; var data = [];
    if(type==='fuel'){ 
        rows.push(["--- COMPRAS (ENTRADAS) ---"]); rows.push(["Data","Combustivel","Litros","Custo"]); 
        DB.get('fuel_logs').filter(function(f){return f.type==='Entrada';}).forEach(function(f){rows.push([f.date,f.fuelType,f.litros,f.val]);}); 
        rows.push(["--- CONSUMOS (SAIDAS) ---"]); rows.push(["Data","Hora","Combustivel","Litros","Equipamento","Marca","Matricula","Funcionario","Valor"]); 
        DB.get('fuel_logs').filter(function(f){return f.type==='Saída';}).forEach(function(f){rows.push([f.date,f.time,f.fuelType,f.litros,f.equipment,f.brand,f.plate,f.empName,f.val]);}); 
    }
    else if(type==='provisions'){ rows.push(["Data","Tipo","Item","Qtd","Responsavel","Custo"]); data = DB.get('provisions_logs'); data.forEach(function(p){rows.push([p.date,p.type,p.item,p.qty,p.responsible,p.cost]);}); }
    else if(type==='equipment'){ rows.push(["Nome","Marca","Tipo","Matricula","V. Compra","Estado"]); data = DB.get('equipment'); data.forEach(function(e){rows.push([e.name,e.brand,e.type,e.plate,e.buyPrice,e.status]);}); }
    else if(type==='finance'){ rows.push(["Data","Desc","Conta","Tipo","Valor","IVA","Estado"]); data = DB.get('finance_logs'); data.forEach(function(f){rows.push([f.date,f.desc,f.account,f.type,f.val,f.iva,f.status]);}); }
    else if(type==='production'){ rows.push(["Data","Hora","Poco","Material","Qtd","Responsavel"]); data = DB.get('production_logs'); data.forEach(function(p){rows.push([p.date,p.time,p.well,p.material,p.qty,p.responsible]);}); }
    else { rows.push(["Acesse o menu especifico para exportar detalhes do geral."]); }

    var csvContent = "data:text/csv;charset=utf-8," + rows.map(function(e) { return e.map(function(cell) { var c = String(cell || ""); if (c.indexOf(";") > -1 || c.indexOf('"') > -1) { c = '"' + c.replace(/"/g, '""') + '"'; } return c; }).join(";"); }).join("\n");
    var encodedUri = encodeURI(csvContent); var link = document.createElement("a"); link.setAttribute("href", encodedUri); link.setAttribute("download", "Relatorio_Mina_Jaliezer.csv"); document.body.appendChild(link); link.click(); showToast('Excel exportado!','success');
}

};
